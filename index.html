<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MACHO'S ALPHA | Umpire Pro</title>
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel (Permite ejecutar React dentro de HTML) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: black; color: white; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const JUGADORES = ["ANDRADE", "ISAI", "VILLEGAS", "ARTURO", "CUTBERTO", "GABRIEL", "LUIS", "ROBIN"];

        function App() {
            const [view, setView] = useState('setup'); 
            const [matches, setMatches] = useState(() => JSON.parse(localStorage.getItem('machos_matches') || '[]'));
            
            // Estado Partido
            const [p1, setP1] = useState(null);
            const [p2, setP2] = useState(null);
            const [mode, setMode] = useState('2-3'); 
            const [score1, setScore1] = useState(0);
            const [score2, setScore2] = useState(0);
            const [sets1, setSets1] = useState(0);
            const [sets2, setSets2] = useState(0);
            const [winner, setWinner] = useState(null);
            const [history, setHistory] = useState([]); 
            const [servingFirst, setServingFirst] = useState(1); 
            
            // Timers & UI
            const [matchTime, setMatchTime] = useState(0);
            const [gameTime, setGameTime] = useState(0);
            const [timeoutSeconds, setTimeoutSeconds] = useState(0);
            const [isTimeoutActive, setIsTimeoutActive] = useState(false);
            const [isPaused, setIsPaused] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [isMuted, setIsMuted] = useState(false); 
            const timerRef = useRef(null);

            // CRONÓMETROS
            useEffect(() => {
                if (view === 'match' && !winner && !isPaused && !showResetConfirm) {
                    timerRef.current = setInterval(() => {
                        if (isTimeoutActive) {
                            setTimeoutSeconds(s => { if (s <= 1) { setIsTimeoutActive(false); return 0; } return s - 1; });
                        } else {
                            setMatchTime(t => t + 1);
                            setGameTime(t => t + 1);
                        }
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [view, winner, isTimeoutActive, isPaused, showResetConfirm]);

            // SÍNTESIS DE VOZ NATIVA (Sin API Key)
            const announceScore = (s1, s2, isWin = false, winName = "") => {
                if (isMuted || !window.speechSynthesis) return;
                window.speechSynthesis.cancel(); // Detiene audios pendientes
                const text = isWin ? `¡Victoria para ${winName}!` : `Marcador: ${s1} a ${s2}`;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-MX'; // Español Latino
                utterance.rate = 1.05;
                window.speechSynthesis.speak(utterance);
            };

            // LÓGICA DE JUEGO Y SAQUE
            const pointsToWin = mode === '1-15' ? 15 : 11;
            const setsNeeded = mode === '2-3' ? 2 : (mode === '3-5' ? 3 : 1);

            const { currentServer, servesRemaining } = useMemo(() => {
                const totalPoints = score1 + score2;
                const isDeuce = score1 >= 10 && score2 >= 10 && mode !== '1-15';
                const serveInterval = isDeuce ? 1 : 2;
                const cyclesPassed = Math.floor(totalPoints / serveInterval);
                const pointsInCurrentCycle = totalPoints % serveInterval;
                const remaining = serveInterval - pointsInCurrentCycle;
                let server = servingFirst === 1 ? (cyclesPassed % 2 === 0 ? 1 : 2) : (cyclesPassed % 2 === 0 ? 2 : 1);
                return { currentServer: server, servesRemaining: remaining };
            }, [score1, score2, servingFirst, mode]);

            const saveState = () => setHistory([...history, { score1, score2, sets1, sets2, winner, gameTime, matchTime, servingFirst }]);
            
            const undo = () => {
                if (history.length === 0) return;
                const last = history.pop();
                setScore1(last.score1); setScore2(last.score2);
                setSets1(last.sets1); setSets2(last.sets2);
                setWinner(last.winner); setGameTime(last.gameTime);
                setMatchTime(last.matchTime); setServingFirst(last.servingFirst);
                setHistory([...history]);
            };

            const addPoint = (player) => {
                if (winner || isTimeoutActive || isPaused || showResetConfirm) return;
                saveState();
                let s1 = score1, s2 = score2;
                if (player === 1) s1++; else s2++;
                
                if (s1 >= pointsToWin && (s1 - s2 >= 2)) {
                    let ns1 = sets1 + 1;
                    setSets1(ns1);
                    if (ns1 === setsNeeded) { setWinner(p1); announceScore(0, 0, true, p1); }
                    else { setScore1(0); setScore2(0); setGameTime(0); announceScore(0, 0, true, p1); }
                } else if (s2 >= pointsToWin && (s2 - s1 >= 2)) {
                    let ns2 = sets2 + 1;
                    setSets2(ns2);
                    if (ns2 === setsNeeded) { setWinner(p2); announceScore(0, 0, true, p2); }
                    else { setScore1(0); setScore2(0); setGameTime(0); announceScore(0, 0, true, p2); }
                } else {
                    player === 1 ? setScore1(s1) : setScore2(s2);
                    announceScore(player === 1 ? s1 : score1, player === 2 ? s2 : score2);
                }
            };

            const finalize = () => {
                if (!winner) return;
                const newMatch = { id: Date.now(), player1: p1, player2: p2, winner, sets1, sets2, mode, timestamp: Date.now() };
                const updatedMatches = [...matches, newMatch];
                setMatches(updatedMatches);
                localStorage.setItem('machos_matches', JSON.stringify(updatedMatches));
                setView('setup');
            };

            const resetMatch = () => {
                setScore1(0); setScore2(0); setSets1(0); setSets2(0); setWinner(null);
                setHistory([]); setGameTime(0); setMatchTime(0); setIsTimeoutActive(false); 
                setTimeoutSeconds(0); setIsPaused(false); setShowResetConfirm(false); setServingFirst(1);
            };

            const startTimeout = () => { setTimeoutSeconds(120); setIsTimeoutActive(true); };
            const changeServe = () => { saveState(); setServingFirst(prev => prev === 1 ? 2 : 1); };
            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;

            // Ranking
            const leaderboard = useMemo(() => {
                return JUGADORES.map(name => {
                    const pMatches = matches.filter(m => m.player1 === name || m.player2 === name);
                    const wins = pMatches.filter(m => m.winner === name).length;
                    return { name, wins, total: pMatches.length, rate: pMatches.length ? (wins/pMatches.length)*100 : 0 };
                }).sort((a,b) => b.rate - a.rate || b.wins - a.wins);
            }, [matches]);

            // --- VISTAS ---
            return (
                <div className="font-sans select-none bg-black min-h-screen text-slate-100 flex flex-col">
                    
                    {/* HOME / SETUP */}
                    {view === 'setup' && (
                        <div className="p-6 pb-24 w-full max-w-md mx-auto overflow-y-auto hide-scrollbar">
                            <header className="text-center mb-8 pt-6">
                                <h1 className="text-6xl font-black text-white italic tracking-tighter leading-none uppercase">MACHO'S<br/><span className="text-[#C61A23]">ALPHA</span></h1>
                                <p className="text-zinc-500 text-[10px] font-bold tracking-[0.4em] mt-3 uppercase">Torneo de Ping Pong</p>
                            </header>

                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-3">
                                    {JUGADORES.map(n => <button key={n} onClick={() => setP1(n)} className={`py-4 rounded-xl font-black text-xs border-2 transition-all ${p1 === n ? 'bg-[#C61A23] border-[#C61A23] text-white shadow-lg shadow-red-900/50' : 'bg-zinc-900 border-transparent text-zinc-500'}`}>{n}</button>)}
                                </div>
                                <div className="text-zinc-700 text-center font-black text-sm italic py-1">VS</div>
                                <div className="grid grid-cols-2 gap-3">
                                    {JUGADORES.map(n => <button key={n} onClick={() => setP2(n)} className={`py-4 rounded-xl font-black text-xs border-2 transition-all ${p2 === n ? 'bg-[#C61A23] border-[#C61A23] text-white shadow-lg shadow-red-900/50' : 'bg-zinc-900 border-transparent text-zinc-500'}`}>{n}</button>)}
                                </div>
                                
                                <div className="flex gap-2 mt-8">
                                    {['2-3', '3-5', '1-15'].map(m => <button key={m} onClick={() => setMode(m)} className={`flex-1 py-4 rounded-xl font-bold text-[10px] transition-colors ${mode === m ? 'bg-white text-black' : 'bg-zinc-900 text-zinc-500'}`}>{m === '1-15' ? '1 SET A 15' : `MEJOR DE ${m.split('-')[1]}`}</button>)}
                                </div>

                                <button disabled={!p1 || !p2 || p1 === p2} onClick={() => { resetMatch(); setView('match'); }} className="w-full bg-[#C61A23] py-6 rounded-2xl text-white font-black uppercase tracking-widest text-lg active:scale-95 transition-all mt-6 disabled:opacity-30 disabled:grayscale">
                                    Iniciar Partido
                                </button>
                                
                                <button onClick={() => setView('ranking')} className="w-full text-zinc-500 font-bold uppercase text-[10px] tracking-widest py-6 hover:text-white transition-colors flex justify-center items-center gap-2">
                                    <i className="fa-solid fa-trophy mr-2"></i> Ver Leaderboard Global
                                </button>
                            </div>
                        </div>
                    )}

                    {/* RANKING */}
                    {view === 'ranking' && (
                        <div className="p-6 pb-20 w-full max-w-md mx-auto overflow-y-auto hide-scrollbar">
                            <button onClick={() => setView('setup')} className="mb-8 text-zinc-500 font-bold uppercase text-[10px] tracking-widest flex items-center gap-2"><i className="fa-solid fa-chevron-left"></i> Volver al Home</button>
                            <h2 className="text-4xl font-black italic mb-2 uppercase tracking-tighter text-white">MACHO'S ALPHA</h2>
                            <p className="text-[#C61A23] text-xs font-black tracking-widest mb-8 uppercase">Leaderboard Global</p>
                            
                            <div className="space-y-3">
                                    {leaderboard.map((s, i) => (
                                        <div key={s.name} className={`flex items-center p-5 rounded-3xl border ${i === 0 ? 'bg-[#C61A23]/20 border-[#C61A23]/50' : 'bg-zinc-900 border-white/5'}`}>
                                            <span className={`w-8 font-black ${i === 0 ? 'text-[#C61A23]' : 'text-zinc-600'}`}>{i+1}</span>
                                            <div className="flex-1 px-4">
                                                <p className="font-black text-sm uppercase text-white">{s.name}</p>
                                                <p className="text-[9px] text-zinc-500 font-bold uppercase mt-1">{s.wins} Ganados / {s.total} Partidos</p>
                                            </div>
                                            <div className="text-right">
                                                <span className="text-2xl font-black leading-none text-white">{Math.round(s.rate)}%</span>
                                                <p className="text-[8px] text-zinc-600 font-bold uppercase">Win Rate</p>
                                            </div>
                                        </div>
                                    ))}
                            </div>
                        </div>
                    )}

                    {/* MARCADOR DEL PARTIDO (ADAPTADO A TABLET Y MÓVIL) */}
                    {view === 'match' && (
                        <div className="fixed inset-0 bg-[#f2f2f2] flex flex-col z-50 overflow-hidden">
                            
                            {/* Top Bar */}
                            <div className="bg-black py-2 px-4 flex justify-between items-center text-white shrink-0 shadow-md relative z-20">
                                <button onClick={() => setView('setup')} className="text-zinc-400 font-bold text-[10px] flex items-center gap-1 uppercase tracking-widest">
                                    <i className="fa-solid fa-chevron-left"></i> Salir
                                </button>
                                <span className="text-[10px] font-black italic tracking-widest text-zinc-500">MACHO'S ALPHA</span>
                                <button onClick={(e) => { e.stopPropagation(); setIsMuted(!isMuted); }} className={`text-zinc-400 p-2 rounded-full active:bg-zinc-800 transition-colors ${isMuted ? 'text-red-500' : ''}`}>
                                    {isMuted ? <i className="fa-solid fa-volume-xmark"></i> : <i className="fa-solid fa-volume-high"></i>}
                                </button>
                            </div>

                            {/* Área principal: flex-col en móvil, flex-row en tablet */}
                            <div className="flex-1 flex flex-col md:flex-row w-full p-2 md:p-4 gap-2 md:gap-4">

                                {/* SECCIÓN JUGADOR 1 */}
                                <div className="flex-1 flex flex-col gap-2 md:gap-4 order-1">
                                    <div className="bg-[#C61A23] py-2 md:py-4 px-4 md:px-6 rounded-[20px] md:rounded-[30px] shadow-md flex items-center justify-between min-h-[70px] md:min-h-[100px] relative z-10 shrink-0">
                                        <div className="w-10 md:w-14"></div> 
                                        <div className="flex flex-col items-center">
                                            <h2 className="text-white text-center font-black text-4xl md:text-5xl tracking-tighter uppercase leading-none">{p1}</h2>
                                            <div className="h-2 w-full flex justify-center gap-2 md:gap-3 mt-1 md:mt-2">
                                                {currentServer === 1 && Array.from({length: servesRemaining}).map((_, i) => (
                                                    <div key={i} className="h-1.5 md:h-2 w-8 md:w-10 bg-white rounded-full shadow-md animate-pulse"></div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="w-10 h-10 md:w-14 md:h-14 bg-black rounded-full flex items-center justify-center text-white font-black text-xl md:text-2xl border-4 border-white shadow-md">{sets1}</div>
                                    </div>

                                    <div onClick={() => addPoint(1)} className="flex-1 bg-black rounded-[30px] md:rounded-[40px] flex flex-col items-center justify-center relative shadow-lg active:scale-[0.98] transition-transform cursor-pointer overflow-hidden">
                                        <button onClick={(e) => { e.stopPropagation(); setIsPaused(!isPaused); }} className="absolute top-4 right-4 md:top-6 md:right-6 w-10 h-10 md:w-14 md:h-14 bg-zinc-800 rounded-full flex items-center justify-center text-white z-20">
                                            {isPaused ? <i className="fa-solid fa-play text-xl"></i> : <i className="fa-solid fa-pause text-xl"></i>}
                                        </button>
                                        <div className="absolute top-5 right-16 md:top-8 md:right-24 text-white font-mono text-[9px] md:text-xs opacity-60 uppercase tracking-widest">MQ:0</div>
                                        <div className="text-white text-[25vh] md:text-[25vw] font-bold leading-none tracking-tighter select-none">{score1}</div>
                                        <div className="absolute bottom-5 left-6 md:bottom-8 md:left-10 text-white font-mono text-[9px] md:text-xs opacity-60 uppercase tracking-widest">M: {formatTime(matchTime)}</div>
                                    </div>
                                </div>

                                {/* CONTROLES CENTRALES */}
                                <div className="flex flex-row md:flex-col items-center justify-center py-2 md:py-0 px-2 md:px-0 gap-4 md:gap-6 order-2 shrink-0 z-20">
                                    <button onClick={undo} className="w-14 h-14 md:w-20 md:h-20 bg-[#E0E0E0] rounded-full flex items-center justify-center text-black shadow-md active:scale-90 transition-transform"><i className="fa-solid fa-rotate-left text-2xl md:text-3xl"></i></button>
                                    <button onClick={changeServe} className="w-14 h-14 md:w-20 md:h-20 bg-[#E0E0E0] rounded-full flex items-center justify-center text-black shadow-md active:scale-90 transition-transform"><i className="fa-solid fa-right-left text-2xl md:text-3xl"></i></button>
                                    <button onClick={startTimeout} className="w-14 h-14 md:w-20 md:h-20 bg-[#C61A23] rounded-full flex items-center justify-center text-white shadow-md active:scale-90 transition-transform"><i className="fa-solid fa-stopwatch text-2xl md:text-3xl"></i></button>
                                    <button onClick={() => setShowResetConfirm(true)} className="w-14 h-14 md:w-20 md:h-20 bg-black rounded-full flex items-center justify-center text-white shadow-md active:scale-90 transition-transform"><i className="fa-solid fa-arrow-rotate-right text-2xl md:text-3xl"></i></button>
                                </div>

                                {/* SECCIÓN JUGADOR 2 */}
                                <div className="flex-1 flex flex-col gap-2 md:gap-4 order-3">
                                    <div className="order-2 md:order-1 bg-[#C61A23] py-2 md:py-4 px-4 md:px-6 rounded-[20px] md:rounded-[30px] shadow-md flex items-center justify-between min-h-[70px] md:min-h-[100px] relative z-10 shrink-0">
                                        <div className="w-10 h-10 md:w-14 md:h-14 bg-black rounded-full flex items-center justify-center text-white font-black text-xl md:text-2xl border-4 border-white shadow-md">{sets2}</div>
                                        <div className="flex flex-col items-center">
                                            <div className="h-2 w-full flex justify-center gap-2 md:gap-3 mb-1 md:mt-0 order-2 md:order-1">
                                                {currentServer === 2 && Array.from({length: servesRemaining}).map((_, i) => (
                                                    <div key={i} className="h-1.5 md:h-2 w-8 md:w-10 bg-white rounded-full shadow-md animate-pulse"></div>
                                                ))}
                                            </div>
                                            <h2 className="text-white text-center font-black text-4xl md:text-5xl tracking-tighter uppercase leading-none order-1 md:order-2">{p2}</h2>
                                        </div>
                                        <div className="w-10 md:w-14"></div>
                                    </div>

                                    <div onClick={() => addPoint(2)} className="order-1 md:order-2 flex-1 bg-black rounded-[30px] md:rounded-[40px] flex flex-col items-center justify-center relative shadow-lg active:scale-[0.98] transition-transform cursor-pointer overflow-hidden">
                                        <div className="absolute top-5 left-6 md:top-8 md:left-10 text-white font-mono text-[9px] md:text-xs opacity-60 uppercase tracking-widest">G1: {formatTime(gameTime)}</div>
                                        <div className="text-white text-[25vh] md:text-[25vw] font-bold leading-none tracking-tighter select-none">{score2}</div>
                                    </div>
                                </div>
                            </div>

                            {/* OVERLAYS MODALES */}
                            {isTimeoutActive && (
                                <div className="fixed inset-0 bg-[#C61A23]/98 backdrop-blur-md z-[500] flex flex-col items-center justify-center p-10 text-white animate-in zoom-in">
                                    <i className="fa-solid fa-stopwatch text-6xl mb-6 opacity-90"></i>
                                    <h3 className="text-3xl font-black uppercase tracking-[0.3em] mb-4">Tiempo Fuera</h3>
                                    <div className="text-[20vh] md:text-[15vw] font-black leading-none tracking-tighter">{formatTime(timeoutSeconds)}</div>
                                    <button onClick={() => setIsTimeoutActive(false)} className="mt-12 bg-white text-[#C61A23] px-16 py-6 rounded-full font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all text-xl">Reanudar Partido</button>
                                </div>
                            )}

                            {showResetConfirm && (
                                <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[500] flex flex-col items-center justify-center p-6 md:p-10 text-white animate-in zoom-in">
                                    <i className="fa-solid fa-arrow-rotate-right text-6xl mb-8 opacity-90"></i>
                                    <h3 className="text-3xl md:text-4xl font-black uppercase tracking-widest mb-4 text-center">¿Juego Nuevo?</h3>
                                    <p className="text-zinc-400 text-center mb-12 max-w-md">El marcador actual se borrará por completo.</p>
                                    <div className="flex flex-col md:flex-row gap-4 w-full max-w-md">
                                        <button onClick={() => setShowResetConfirm(false)} className="flex-1 bg-zinc-800 text-white py-6 rounded-2xl font-bold uppercase tracking-widest active:scale-95 transition-all">Cancelar</button>
                                        <button onClick={resetMatch} className="flex-1 bg-[#C61A23] text-white py-6 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all">Reiniciar</button>
                                    </div>
                                </div>
                            )}

                            {isPaused && !isTimeoutActive && !winner && !showResetConfirm && (
                                <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[400] flex flex-col items-center justify-center">
                                    <i className="fa-solid fa-pause text-7xl text-white mb-6 opacity-50"></i>
                                    <h3 className="text-3xl font-black text-white uppercase tracking-widest mb-10">Partido Pausado</h3>
                                    <button onClick={() => setIsPaused(false)} className="bg-[#C61A23] text-white px-12 py-5 rounded-full font-black uppercase tracking-widest">Continuar</button>
                                </div>
                            )}

                            {winner && (
                                <div className="fixed inset-0 bg-black/98 z-[600] flex flex-col items-center justify-center text-center p-6 md:p-10 animate-in zoom-in duration-500">
                                <i className="fa-solid fa-crown text-9xl text-[#C61A23] mb-8"></i>
                                <p className="text-[#C61A23] font-black uppercase tracking-[0.5em] text-[10px] md:text-xs mb-4">Ganador del Encuentro</p>
                                <h2 className="text-[12vh] md:text-[10vw] font-black text-white mb-16 uppercase italic tracking-tighter leading-none">{winner}</h2>
                                <div className="flex flex-col md:flex-row w-full gap-4 max-w-lg">
                                    <button onClick={finalize} className="flex-1 bg-[#C61A23] text-white py-6 rounded-3xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Finalizar y Guardar</button>
                                    <button onClick={undo} className="flex-1 bg-zinc-900 text-white py-6 rounded-3xl font-bold uppercase tracking-widest text-[10px] md:text-xs border border-white/10 active:scale-95">Error, Seguir Jugando</button>
                                </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
